<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Femi | Tech</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--accent); }
        p { color: #94a3b8; line-height: 1.6; }
        
        /* Contact Form */
        form { margin-top: 2rem; text-align: left; }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: var(--bg);
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); opacity: 0.9; }

        .social-links { margin-top: 2rem; border-top: 1px solid #334155; padding-top: 1.5rem; }
        .social-links a {
            color: var(--accent);
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>femi.</h1>
        <p>security engineer // tech enthusiast // problem solver</p>
        <p>welcome to my corner of the web.</p>
        
        <form action="https://formspree.io/f/xbdzdrlg" method="POST">
            <label>leave a message:</label>
            <input type="email" name="email" placeholder="your email" required>
            <textarea name="message" rows="3" placeholder="what's on your mind?" required></textarea>
            <button type="submit">send message</button>
        </form>

        <div class="social-links">
            <!-- <a href="mailto:public@femi.tech">Email</a> -->
            <!-- <a href="https://www.linkedin.com/i">LinkedIn</a> -->
            <!-- <a href="https://github.com/yourusername">GitHub</a> -->
        </div>
    </div>

</body>
</html>
